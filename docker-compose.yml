services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - API_BASE_URL=${API_BASE_URL:-https://api.minimax.chat}
    volumes:
      - ./backend/downloads:/app/downloads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
